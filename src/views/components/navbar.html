<script>
  // IIFE 防止变量污染，处理菜单展开与路由高亮
  (function() {
    const path = window.location.pathname;
    
    // 处理桌面端高亮
    document.querySelectorAll('#desktop-nav .nav-link').forEach(link => {
      const href = link.getAttribute('href');
      if (path === href || (href === '/admin' && path === '/admin/')) {
        link.classList.remove('text-gray-700', 'border-transparent');
        link.classList.add('text-indigo-600', 'border-indigo-600');
      }
    });

    // 处理移动端高亮
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      const href = link.getAttribute('href');
      if (path === href || (href === '/admin' && path === '/admin/')) {
        link.classList.remove('text-gray-700');
        link.classList.add('text-indigo-600', 'bg-indigo-50');
      }
    });

    // 移动端菜单切换逻辑
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    if (btn && menu) {
      const syncState = () => {
        const isHidden = menu.classList.contains('hidden');
        btn.innerHTML = isHidden ? '<i class="fas fa-bars text-xl"></i>' : '<i class="fas fa-times text-xl"></i>';
      };
      btn.addEventListener('click', () => { menu.classList.toggle('hidden'); syncState(); });
      menu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => { menu.classList.add('hidden'); syncState(); }));
    }
  })();
</script>
