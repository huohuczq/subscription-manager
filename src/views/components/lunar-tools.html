      0x15176, 0x052b0, 0x0a930, 0x07954, 0x06aa0, 0x0ad50, 0x05b52, 0x04b60, 0x0a6e6, 0x0a4e0,

    ],
    gan: ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'],
    zhi: ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'],
    months: ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'],
    days: ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
           '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
           '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'],

    lunarYearDays: function(year) {
      let sum = 348;
      for (let i = 0x8000; i > 0x8; i >>= 1) sum += (this.lunarInfo[year - 1900] & i) ? 1 : 0;
      return sum + this.leapDays(year);
    },
    leapDays: function(year) {
      if (this.leapMonth(year)) return (this.lunarInfo[year - 1900] & 0x10000) ? 30 : 29;
      return 0;
    },
    leapMonth: function(year) {
      return this.lunarInfo[year - 1900] & 0xf;
    },
    monthDays: function(year, month) {
      return (this.lunarInfo[year - 1900] & (0x10000 >> month)) ? 30 : 29;
    },
    solar2lunar: function(year, month, day) {
      if (year < 1900 || year > 2100) return null;
      const baseDate = Date.UTC(1900, 0, 31);
      const objDate = Date.UTC(year, month - 1, day);
      let offset = Math.round((objDate - baseDate) / 86400000);

      let temp = 0;
      let lunarYear = 1900;
      for (lunarYear = 1900; lunarYear < 2101 && offset > 0; lunarYear++) {
        temp = this.lunarYearDays(lunarYear);
        offset -= temp;
      }
      if (offset < 0) { offset += temp; lunarYear--; }

      let lunarMonth = 1;
      let leap = this.leapMonth(lunarYear);
      let isLeap = false;
      for (lunarMonth = 1; lunarMonth < 13 && offset > 0; lunarMonth++) {
        if (leap > 0 && lunarMonth === (leap + 1) && !isLeap) {
          --lunarMonth; isLeap = true; temp = this.leapDays(lunarYear);
        } else { temp = this.monthDays(lunarYear, lunarMonth); }
        if (isLeap && lunarMonth === (leap + 1)) isLeap = false;
        offset -= temp;
      }

      if (offset === 0 && leap > 0 && lunarMonth === leap + 1) {
        if (isLeap) isLeap = false;
        else { isLeap = true; --lunarMonth; }
      }
      if (offset < 0) { offset += temp; --lunarMonth; }

      const lunarDay = offset + 1;
      const ganIndex = (lunarYear - 4) % 10;
      const zhiIndex = (lunarYear - 4) % 12;
      const yearStr = this.gan[ganIndex] + this.zhi[zhiIndex] + '年';
      const monthStr = (isLeap ? '闰' : '') + this.months[lunarMonth - 1] + '月';
      const dayStr = this.days[lunarDay - 1];

      return {
        year: lunarYear, month: lunarMonth, day: lunarDay, isLeap: isLeap,
        yearStr: yearStr, monthStr: monthStr, dayStr: dayStr,
        fullStr: yearStr + monthStr + dayStr
      };
    }
  };

  window.lunar2solar = function(lunar) {
    for (let y = lunar.year - 1; y <= lunar.year + 1; y++) {
      for (let m = 1; m <= 12; m++) {
        for (let d = 1; d <= 31; d++) {
          const date = new Date(y, m - 1, d);
          if (date.getFullYear() !== y || date.getMonth() + 1 !== m || date.getDate() !== d) continue;
          const l = window.lunarCalendar.solar2lunar(y, m, d);
          if (l && l.year === lunar.year && l.month === lunar.month && l.day === lunar.day && l.isLeap === lunar.isLeap) {
            return { year: y, month: m, day: d };
          }
        }
      }
    }
    return null;
  };

  window.addLunarPeriod = function(lunar, periodValue, periodUnit) {
    let { year, month, day, isLeap } = lunar;
    if (periodUnit === 'year') {
      year += periodValue;
      const leap = window.lunarCalendar.leapMonth(year);
      if (isLeap && leap === month) isLeap = true; else isLeap = false;
    } else if (periodUnit === 'month') {
      let totalMonths = (year - 1900) * 12 + (month - 1) + periodValue;
      year = Math.floor(totalMonths / 12) + 1900;
      month = (totalMonths % 12) + 1;
      const leap = window.lunarCalendar.leapMonth(year);
      if (isLeap && leap === month) isLeap = true; else isLeap = false;
    } else if (periodUnit === 'day') {
      const solar = window.lunar2solar(lunar);
      const date = new Date(solar.year, solar.month - 1, solar.day + periodValue);
      return window.lunarCalendar.solar2lunar(date.getFullYear(), date.getMonth() + 1, date.getDate());
    }
    let maxDay = isLeap ? window.lunarCalendar.leapDays(year) : window.lunarCalendar.monthDays(year, month);
    let targetDay = Math.min(day, maxDay);
    while (targetDay > 0) {
      let solar = window.lunar2solar({ year, month, day: targetDay, isLeap });
      if (solar) return { year, month, day: targetDay, isLeap };
      targetDay--;
    }
    return { year, month, day, isLeap };
  };

  window.lunarBiz = {
    addLunarPeriod: function(lunar, periodValue, periodUnit) { return window.addLunarPeriod(lunar, periodValue, periodUnit); },
    lunar2solar: function(lunar) { return window.lunar2solar(lunar); },
    daysToLunar: function(lunar) {
      const solar = window.lunarBiz.lunar2solar(lunar);
      const date = new Date(solar.year, solar.month - 1, solar.day);
      const now = new Date();
      return Math.ceil((date - now) / (1000 * 60 * 60 * 24));
    }
  };

  // 标准化日期字符串（为了 CustomDatePicker 需要）
  window.normalizeDateString = function(value) {
    if (!value) return '';
    const raw = String(value).trim();
    if (!raw) return '';
    const directMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (directMatch) {
      const year = Number(directMatch[1]), month = Number(directMatch[2]), day = Number(directMatch[3]);
      const parsed = new Date(year, month - 1, day);
      if (!isNaN(parsed.getTime()) && parsed.getFullYear() === year && parsed.getMonth() === month - 1 && parsed.getDate() === day) {
        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      }
    }
    const parsed = new Date(raw);
    if (!isNaN(parsed.getTime())) {
      return `${parsed.getFullYear()}-${String(parsed.getMonth() + 1).padStart(2, '0')}-${String(parsed.getDate()).padStart(2, '0')}`;
    }
    return '';
  };

  window.CustomDatePicker = class CustomDatePicker {
      constructor(inputId, pickerId, calendarId, monthId, yearId, prevBtnId, nextBtnId) {
        this.input = document.getElementById(inputId);
        this.picker = document.getElementById(pickerId);
        this.calendar = document.getElementById(calendarId);
        this.monthElement = document.getElementById(monthId);
        this.yearElement = document.getElementById(yearId);
        this.prevBtn = document.getElementById(prevBtnId);
        this.nextBtn = document.getElementById(nextBtnId);
        
        this.monthPicker = document.getElementById(pickerId.replace('Picker', 'MonthPicker'));
        this.yearPicker = document.getElementById(pickerId.replace('Picker', 'YearPicker'));
        this.backToCalendarBtn = document.getElementById(pickerId.replace('Picker', 'BackToCalendar'));
        this.backToCalendarFromYearBtn = document.getElementById(pickerId.replace('Picker', 'BackToCalendarFromYear'));
        this.goToTodayBtn = document.getElementById(pickerId.replace('Picker', 'GoToToday'));
        this.prevYearDecadeBtn = document.getElementById(pickerId.replace('Picker', 'PrevYearDecade'));
        this.nextYearDecadeBtn = document.getElementById(pickerId.replace('Picker', 'NextYearDecade'));
        this.yearRangeElement = document.getElementById(pickerId.replace('Picker', 'YearRange'));
        this.yearGrid = document.getElementById(pickerId.replace('Picker', 'YearGrid'));
        
        this.currentDate = new Date();
        this.selectedDate = null;
        this.currentView = 'calendar';
        this.yearDecade = Math.floor(this.currentDate.getFullYear() / 10) * 10;
        
        this.init();
      }
      
      init() {
        if (this.input) {
          this.input.removeEventListener('click', this._forceShowHandler);
          this._forceShowHandler = () => this.forceShow();
          this.input.addEventListener('click', this._forceShowHandler);
          if (this._manualInputHandler) this.input.removeEventListener('blur', this._manualInputHandler);
          this._manualInputHandler = () => this.syncFromInputValue();
          this.input.addEventListener('blur', this._manualInputHandler);

          if (this._manualKeydownHandler) this.input.removeEventListener('keydown', this._manualKeydownHandler);
          this._manualKeydownHandler = (event) => { if (event.key === 'Enter') { event.preventDefault(); this.syncFromInputValue(); } };
          this.input.addEventListener('keydown', this._manualKeydownHandler);
        }
        
        if (this.prevBtn) { this.prevBtn.removeEventListener('click', this._prevHandler); this._prevHandler = () => this.previousMonth(); this.prevBtn.addEventListener('click', this._prevHandler); }
        if (this.nextBtn) { this.nextBtn.removeEventListener('click', this._nextHandler); this._nextHandler = () => this.nextMonth(); this.nextBtn.addEventListener('click', this._nextHandler); }
        if (this.monthElement) { this.monthElement.removeEventListener('click', this._showMonthHandler); this._showMonthHandler = () => this.showMonthPicker(); this.monthElement.addEventListener('click', this._showMonthHandler); }
        if (this.yearElement) { this.yearElement.removeEventListener('click', this._showYearHandler); this._showYearHandler = () => this.showYearPicker(); this.yearElement.addEventListener('click', this._showYearHandler); }
        
        if (this.monthPicker) {
          this.monthPicker.removeEventListener('click', this._monthSelectHandler);
          this._monthSelectHandler = (e) => { if (e.target.classList.contains('month-option')) this.selectMonth(parseInt(e.target.dataset.month)); };
          this.monthPicker.addEventListener('click', this._monthSelectHandler);
        }
        
        if (this.backToCalendarBtn) { this.backToCalendarBtn.removeEventListener('click', this._backToCalendarHandler); this._backToCalendarHandler = () => this.showCalendar(); this.backToCalendarBtn.addEventListener('click', this._backToCalendarHandler); }
        if (this.backToCalendarFromYearBtn) { this.backToCalendarFromYearBtn.removeEventListener('click', this._backToCalendarFromYearHandler); this._backToCalendarFromYearHandler = () => this.showCalendar(); this.backToCalendarFromYearBtn.addEventListener('click', this._backToCalendarFromYearHandler); }
        if (this.prevYearDecadeBtn) { this.prevYearDecadeBtn.removeEventListener('click', this._prevYearDecadeHandler); this._prevYearDecadeHandler = (e) => { e.stopPropagation(); this.previousYearDecade(); }; this.prevYearDecadeBtn.addEventListener('click', this._prevYearDecadeHandler); }
        if (this.nextYearDecadeBtn) { this.nextYearDecadeBtn.removeEventListener('click', this._nextYearDecadeHandler); this._nextYearDecadeHandler = (e) => { e.stopPropagation(); this.nextYearDecade(); }; this.nextYearDecadeBtn.addEventListener('click', this._nextYearDecadeHandler); }
        if (this.goToTodayBtn) { this.goToTodayBtn.removeEventListener('click', this._goToTodayHandler); this._goToTodayHandler = () => this.goToToday(); this.goToTodayBtn.addEventListener('click', this._goToTodayHandler); }
        
        if (this._outsideClickHandler) document.removeEventListener('click', this._outsideClickHandler);
        this._outsideClickHandler = (e) => { if (this.picker && !this.picker.contains(e.target) && !this.input.contains(e.target)) this.hide(); };
        document.addEventListener('click', this._outsideClickHandler);
        
        this.syncFromInputValue({ silent: true });
        this.render();
        this.renderYearGrid();
      }
      
      toggle() { if (this.picker && this.picker.classList.contains('hidden')) this.show(); else this.hide(); }
      forceShow() { if (this.picker) { this.picker.classList.remove('hidden'); this.currentView = 'calendar'; this.hideAllViews(); this.render(); } }
      show() { if (this.picker) { this.picker.classList.remove('hidden'); this.render(); } }
      hide() { if (this.picker) this.picker.classList.add('hidden'); }
      previousMonth() { this.currentDate.setMonth(this.currentDate.getMonth() - 1); this.render(); }
      nextMonth() { this.currentDate.setMonth(this.currentDate.getMonth() + 1); this.render(); }
      
      selectDate(date) {
        this.selectedDate = date;
        if (this.input) this.input.value = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        this.hide();
        if (this.input) this.input.dispatchEvent(new Event('change', { bubbles: false }));
      }

      syncFromInputValue(options = {}) {
        if (!this.input) return;
        const { silent = false } = options;
        const value = this.input.value.trim();
        if (!value) { this.selectedDate = null; return; }
        const normalized = window.normalizeDateString(value);
        if (!normalized) { if (!silent && typeof window.showToast === 'function') window.showToast('日期格式需为 YYYY-MM-DD', 'warning'); return; }
        const [yearStr, monthStr, dayStr] = normalized.split('-');
        const year = Number(yearStr), month = Number(monthStr), day = Number(dayStr);
        const parsed = new Date(year, month - 1, day);
        if (isNaN(parsed.getTime()) || parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
          if (!silent && typeof window.showToast === 'function') window.showToast('请输入有效的日期', 'warning'); return;
        }
        this.input.value = normalized;
        this.selectedDate = parsed;
        this.currentDate = new Date(parsed);
        this.render();
        this.input.dispatchEvent(new Event('change', { bubbles: false }));
      }
      
      render() {
        if (!this.monthElement || !this.yearElement || !this.calendar) return;
        const year = this.currentDate.getFullYear(), month = this.currentDate.getMonth();
        this.monthElement.textContent = (month + 1) + '月';
        this.yearElement.textContent = year;
        this.calendar.innerHTML = '';
        
        const firstDay = new Date(year, month, 1);
        const startDate = new Date(firstDay);
        startDate.setDate(startDate.getDate() - firstDay.getDay());
        
        for (let i = 0; i < 42; i++) {
          const date = new Date(startDate);
          date.setDate(startDate.getDate() + i);
          const dayElement = document.createElement('div');
          dayElement.className = 'calendar-day';
          if (date.getMonth() !== month) dayElement.classList.add('other-month');
          if (date.toDateString() === new Date().toDateString()) dayElement.classList.add('today');
          if (this.selectedDate && date.toDateString() === this.selectedDate.toDateString()) dayElement.classList.add('selected');
          
          let lunarText = '';
          try {
            const lunar = window.lunarCalendar.solar2lunar(date.getFullYear(), date.getMonth() + 1, date.getDate());
            if (lunar) lunarText = lunar.day === 1 ? (lunar.isLeap ? '闰' + lunar.monthStr.replace('闰', '') : lunar.monthStr) : lunar.dayStr;
          } catch (error) {}
          
          dayElement.innerHTML = '<div>' + date.getDate() + '</div><div class="lunar-text">' + lunarText + '</div>';
          dayElement.addEventListener('click', () => this.selectDate(date));
          this.calendar.appendChild(dayElement);
        }
      }
      
      showMonthPicker() {
        this.currentView = 'month'; this.hideAllViews();
        if (this.monthPicker) {
          this.monthPicker.classList.remove('hidden');
          this.monthPicker.querySelectorAll('.month-option').forEach((option, index) => {
            option.classList.remove('selected');
            if (index === this.currentDate.getMonth()) option.classList.add('selected');
          });
        }
      }
      
      showYearPicker() { this.currentView = 'year'; this.hideAllViews(); if (this.yearPicker) this.yearPicker.classList.remove('hidden'); this.renderYearGrid(); }
      showCalendar() { this.currentView = 'calendar'; this.hideAllViews(); this.render(); }
      hideAllViews() { if (this.monthPicker) this.monthPicker.classList.add('hidden'); if (this.yearPicker) this.yearPicker.classList.add('hidden'); }
      selectMonth(month) { this.currentDate.setMonth(month); this.showCalendar(); }
      selectYear(year) { this.currentDate.setFullYear(year); this.showCalendar(); }
      previousYearDecade() { this.yearDecade -= 10; this.renderYearGrid(); }
      nextYearDecade() { this.yearDecade += 10; this.renderYearGrid(); }
      
      renderYearGrid() {
        if (!this.yearGrid || !this.yearRangeElement) return;
        const startYear = this.yearDecade, endYear = this.yearDecade + 9;
        this.yearRangeElement.textContent = startYear + '-' + endYear;
        this.yearGrid.innerHTML = '';
        for (let year = startYear; year <= endYear; year++) {
          const yearBtn = document.createElement('button');
          yearBtn.type = 'button';
          yearBtn.className = 'year-option px-3 py-2 text-sm rounded hover:bg-gray-100';
          yearBtn.textContent = year;
          yearBtn.dataset.year = year;
          if (year === this.currentDate.getFullYear()) yearBtn.classList.add('bg-indigo-100', 'text-indigo-600');
          if (year < 1900 || year > 2100) { yearBtn.disabled = true; yearBtn.classList.add('opacity-50', 'cursor-not-allowed'); } 
          else yearBtn.addEventListener('click', () => this.selectYear(year));
          this.yearGrid.appendChild(yearBtn);
        }
      }     
      goToToday() { this.currentDate = new Date(); this.yearDecade = Math.floor(this.currentDate.getFullYear() / 10) * 10; this.showCalendar(); }
      
      destroy() {
        this.hide();       
        if (this.input && this._forceShowHandler) this.input.removeEventListener('click', this._forceShowHandler);
        if (this.input && this._manualInputHandler) this.input.removeEventListener('blur', this._manualInputHandler);
        if (this.input && this._manualKeydownHandler) this.input.removeEventListener('keydown', this._manualKeydownHandler);
        if (this.prevBtn && this._prevHandler) this.prevBtn.removeEventListener('click', this._prevHandler);
        if (this.nextBtn && this._nextHandler) this.nextBtn.removeEventListener('click', this._nextHandler);
        if (this.monthElement && this._showMonthHandler) this.monthElement.removeEventListener('click', this._showMonthHandler);
        if (this.yearElement && this._showYearHandler) this.yearElement.removeEventListener('click', this._showYearHandler);
        if (this.monthPicker && this._monthSelectHandler) this.monthPicker.removeEventListener('click', this._monthSelectHandler);
        if (this.backToCalendarBtn && this._backToCalendarHandler) this.backToCalendarBtn.removeEventListener('click', this._backToCalendarHandler);
        if (this.backToCalendarFromYearBtn && this._backToCalendarFromYearHandler) this.backToCalendarFromYearBtn.removeEventListener('click', this._backToCalendarFromYearHandler);
        if (this.prevYearDecadeBtn && this._prevYearDecadeHandler) this.prevYearDecadeBtn.removeEventListener('click', this._prevYearDecadeHandler);
        if (this.nextYearDecadeBtn && this._nextYearDecadeHandler) this.nextYearDecadeBtn.removeEventListener('click', this._nextYearDecadeHandler);
        if (this.goToTodayBtn && this._goToTodayHandler) this.goToTodayBtn.removeEventListener('click', this._goToTodayHandler);
        if (this._outsideClickHandler) document.removeEventListener('click', this._outsideClickHandler);
      }
  };
</script>
